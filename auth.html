<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrustWatch AI — Sign In</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Firebase (Local) -->
  <script src="libs/firebase-app-compat.js"></script>
  <script src="libs/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LOADING OVERLAY — while checking auth state               -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div class="auth-loading" id="authLoading">
    <div class="auth-loading-icon">🛡️</div>
    <div class="auth-loading-bar"></div>
    <div class="auth-loading-text">Checking authentication...</div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- AUTH CONTAINER                                            -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div class="auth-container" id="authContainer" style="display:none;">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">🛡️</div>
      <div class="auth-brand">TrustWatch AI</div>
      <div class="auth-tagline">Cyber-Forensic Fraud Detector</div>
    </div>

    <!-- Tab Switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" data-tab="login">Sign In</button>
      <button class="auth-tab" id="tabSignup" data-tab="signup">Sign Up</button>
    </div>

    <!-- Form Area -->
    <div class="auth-form-container">

      <!-- Message -->
      <div class="auth-message" id="authMessage"></div>

      <!-- ═══ LOGIN FORM ═══ -->
      <form class="auth-form" id="loginForm" autocomplete="on">
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <span class="input-icon">📧</span>
          <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
        </div>

        <div class="input-group">
          <label for="loginPassword">Password</label>
          <span class="input-icon">🔑</span>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="password-toggle" id="loginPwdToggle">👁️</button>
        </div>

        <button type="submit" class="auth-submit" id="loginSubmit">
          ⚡ Sign In
        </button>

        <div class="auth-divider"><span>or</span></div>

        <button type="button" class="google-btn" id="googleLoginBtn">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </form>

      <!-- ═══ SIGNUP FORM ═══ -->
      <form class="auth-form hidden" id="signupForm" autocomplete="on">
        <div class="input-group">
          <label for="signupName">Full Name</label>
          <span class="input-icon">👤</span>
          <input type="text" id="signupName" placeholder="Your Name" required autocomplete="name">
        </div>

        <div class="input-group">
          <label for="signupEmail">Email</label>
          <span class="input-icon">📧</span>
          <input type="email" id="signupEmail" placeholder="your@email.com" required autocomplete="email">
        </div>

        <div class="input-group">
          <label for="signupPassword">Password</label>
          <span class="input-icon">🔑</span>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
          <button type="button" class="password-toggle" id="signupPwdToggle">👁️</button>
        </div>

        <button type="submit" class="auth-submit" id="signupSubmit">
          🛡️ Create Account
        </button>

        <div class="auth-divider"><span>or</span></div>

        <button type="button" class="google-btn" id="googleSignupBtn">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign Up with Google
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      <p class="auth-footer-text">
        🔒 Your data is <span>encrypted & private</span><br>
        TrustWatch AI v1.0 • Open Source
      </p>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
